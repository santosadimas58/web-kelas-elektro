services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: web-kelas-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    ports:
      - "8001:8000"
    depends_on:
      mysql:
        condition: service_healthy
    entrypoint: ["/var/www/docker-entrypoint.sh"]
  mysql:
    image: mysql:8.0
    container_name: web-kelas-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: web_kelas_elektro
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: web-kelas-phpmyadmin
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
    ports:
      - "8082:80"
volumes:
  mysql_data:
